version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: ai_infra_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_infrastructure_prod}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ai_infra_postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_infrastructure_prod}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ai-infra-network

  redis:
    image: redis:7-alpine
    container_name: ai_infra_redis_prod
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ai_infra_redis_data:/data
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ai-infra-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_infra_backend_prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_infrastructure_prod}
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      ENVIRONMENT: production
      API_V1_PREFIX: /api/v1
    ports:
      - "${BACKEND_PORT:-8100}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-infra-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8100/api/v1}
    container_name: ai_infra_frontend_prod
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3100}:80"
    depends_on:
      - backend
    networks:
      - ai-infra-network

networks:
  ai-infra-network:
    driver: bridge

volumes:
  ai_infra_postgres_data:
  ai_infra_redis_data:
